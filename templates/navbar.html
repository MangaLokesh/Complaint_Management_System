<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
body{
   font-family:sans-serif;
    background:#f4f6fb;
   color:#111;
   }
 .navbar{
   width:100%;
   background:#fff;
   padding:14px 20px;
   display:flex;
   justify-content:space-between;
   align-items:center;
   flex-wrap:wrap;
   box-shadow:0 2px 12px rgba(0,0,0,0.08);
   position:sticky;
   top:0;
   z-index:10;
 }
 h1{
   color:#1a73e8;
   
 }
 .nav-links{
   display:flex;
   align-items:center;
   gap:18px;
 }
 .nav-links a{
   text-decoration:none;
   font-weight:700;
   color:#222;
   padding:8px 10px;
   border-radius:8px;
   transition:0.2s;
 }
 .nav-links a:hover{
   background:#e8f0fe;
   color:#1a73e8;
 }
 #logout{
   background-color:rgb(255, 0, 0);
   color:white;
 }
 #logout:hover{
   background-color:rgb(205, 24, 24);
 }
 @media (max-width:790px){
  h1{
    font-size: 20px;
  }
  .nav-links a{
    font-size: 15px;
  }
}
  @media (max-width:635px){
  h1{
    transition: 3s;
    font-size: 17px;
  }
  .nav-links a{
    transition: 3s;
    font-size: 13px;
  }
}
 @media (max-width:590px){
  .navbar{
    transition: 3s;
    padding-left: 5px;
    padding-right: 5px;
  }
}
 @media (max-width:495px){
  .nav-links a{
    transition: 3s;
    padding: 8px 3px;
  }
}
 @media (max-width:465px){
  .nav-links a{
    transition: 3s;
    font-size: 12px;
  }
}

@media (max-width:445px){
  .nav-links a{
    transition: 3s;
    font-size: 10px;
  }
  h1{
    font-size: medium;
  }
}
@media (max-width:407px){
  h1{
    font-size: small;
  }
}
    </style>
</head>
<body>
    <div class="navbar">
        <h1>Complaint Management System</h1>
        <div class="nav-links" id="navLinks">
      
        </div>
    </div>
    <script>
        const nav = document.getElementById("navLinks");
        const token = localStorage.getItem("access");
        
        if (token) {
          nav.innerHTML = `
            <a href="{% url 'my_complaints_page'%}">My Complaints</a>
            <a href="#" onclick="logout()">Logout</a>
          `;
        } else {
          nav.innerHTML = `
            <a href="{% url 'home'%}">Home</a>
            <a href="{% url 'login'%}">Login</a>
            <a href="{% url 'register'%}">Register</a>
          `;
        }
        
        function logout() {
          localStorage.removeItem("access");
          localStorage.removeItem("refresh");
          window.location.href = "{% url 'login'%}";
        }
      </script>
</body>
</html>
